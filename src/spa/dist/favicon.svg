<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .s { stroke: #111; fill: none; }
    .f { fill: #111; }
    @media (prefers-color-scheme: dark) {
      .s { stroke: #fff; }
      .f { fill: #fff; }
    }
  </style>
  <!-- Blade -->
  <path d="M16 1 L19 21 L16 23 L13 21 Z" class="f"/>
  <!-- Fuller -->
  <line x1="16" y1="4" x2="16" y2="19" class="s" stroke-width="0.8" opacity="0.3"/>
  <!-- Crossguard -->
  <path d="M7 22.5 Q7 21 9 21 L23 21 Q25 21 25 22.5 Q25 24 23 24 L9 24 Q7 24 7 22.5 Z" class="f"/>
  <!-- Grip -->
  <rect x="14" y="24" width="4" height="4" rx="0.5" class="f"/>
  <!-- Grip wrap -->
  <line x1="14" y1="25.5" x2="18" y2="25.5" class="s" stroke-width="0.5" opacity="0.3"/>
  <line x1="14" y1="27" x2="18" y2="27" class="s" stroke-width="0.5" opacity="0.3"/>
  <!-- Pommel -->
  <ellipse cx="16" cy="30" rx="2.5" ry="1.8" class="f"/>
</svg>
