name: Import benchmark data

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC = 03:00 CET (winter) / 04:00 CEST (summer)
  workflow_dispatch:      # allow manual trigger from the Actions UI

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout HttpArena-Timeline
        uses: actions/checkout@v4
        with:
          path: HttpArena-Timeline

      - name: Checkout HttpArena
        uses: actions/checkout@v4
        with:
          repository: MDA2AV/HttpArena
          path: HttpArena
          fetch-depth: 0   # importer walks the full git history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run importer
        run: |
          dotnet run \
            --project HttpArena-Timeline/src/Importer/Importer.csproj \
            --configuration Release \
            -- \
            "$GITHUB_WORKSPACE/HttpArena" \
            "$GITHUB_WORKSPACE/HttpArena-Timeline/data"

      - name: Commit and push data changes
        working-directory: HttpArena-Timeline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new benchmark data."
          else
            git commit -m "chore: update benchmark data $(date -u +%Y-%m-%d)"
            git push
          fi
